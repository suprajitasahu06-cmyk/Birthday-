<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Valentine ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #fdeff2;
    text-align: center;
}

/* Glowing Border */
body::before {
    content: "";
    position: fixed;
    inset: 10px;
    border-radius: 25px;
    border: 3px solid #ff9bb3;
    box-shadow:
        0 0 10px #ff9bb3,
        0 0 20px #ffb6c1,
        0 0 30px #ffc0cb;
    pointer-events: none;
}

/* Calendar */
.calendar {
    margin-top: 40px;
    display: inline-block;
    background: #fff;
    padding: 15px;
    border-radius: 15px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.calendar h2 {
    margin: 0;
    color: #ff4d6d;
}

.days {
    display: grid;
    grid-template-columns: repeat(7, 40px);
    gap: 5px;
    margin-top: 10px;
}

.day {
    padding: 8px;
}

/* Heart highlight with visible number */
.heart-day {
    background: #ff4d6d;
    color: white;
    font-weight: bold;
    border-radius: 50% 50% 0 0;
    position: relative;
}

.heart-day::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: #ff4d6d;
    border-radius: 50%;
    bottom: -10px;
    left: 0;
    z-index: -1;
}

/* Pulsating Heart */
.heart {
    font-size: 80px;
    color: #ff4d6d;
    animation: pulse 1.5s infinite;
    margin-top: 40px;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

button {
    padding: 12px 25px;
    margin-top: 20px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* Message section */
.message {
    display: none;
    padding: 20px;
}

.message img {
    width: 180px;
    border-radius: 15px;
}

/* Highlighted message text */
.highlight-text {
    font-weight: bold;
    background: #ffe4ec;
    padding: 12px;
    border-radius: 15px;
    display: inline-block;
    font-size: 18px;
}
</style>
</head>

<body>

<!-- Calendar -->
<div class="calendar">
<h2>February</h2>
<div class="days">
<span class="day">1</span><span class="day">2</span>
<span class="day">3</span><span class="day">4</span>
<span class="day">5</span><span class="day">6</span>
<span class="day">7</span><span class="day">8</span>
<span class="day">9</span><span class="day">10</span>
<span class="day">11</span><span class="day">12</span>
<span class="day">13</span>
<span class="day highlight-text">14</span>
<span class="day">15</span><span class="day">16</span>
<span class="day">17</span><span class="day">18</span>
<span class="day">19</span><span class="day">20</span>
<span class="day">21</span><span class="day">22</span>
<span class="day">23</span><span class="day">24</span>
<span class="day">25</span><span class="day">26</span>
<span class="day">27</span><span class="day">28</span>
</div>
</div>

<!-- Pulsating Heart -->
<div class="heart">❤️</div>
<button onclick="showMsg()">Click Me❤️</button>

<!-- Hidden Message -->
<div class="message" id="msg">
<img src="https://media0.giphy.com/media/v1.Y2lkPTZjMDliOTUyamVnZWNiem5reHRyNDhhMWM2dmk0bTRtZXEwNmhhbzByemV1a3EzMCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/gjHkRHSuHqu99y9Yjt/giphy.gif">
<h2>Dear Happie ❤️</h2>

<p class="highlight-text">
Would you be my valentine for now and forever 💗?
</p>

<button onclick="nextPage()">Yes 😚</button>
<button onclick="nextPage()">Obviously Yes ❤️ </button>
</div>

<script>
function showMsg(){
    document.getElementById("msg").style.display="block";
}

function nextPage(){
    window.location.href="letter.html";
}
</script>

</body>
</html>
