body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#1b1b2f,#162447,#1f4068);
  color:white;
  overflow-x:hidden;
}

/* cinematic sparkle background */
.sparkle{
  position:fixed;
  width:4px;
  height:4px;
  border-radius:50%;
  background:white;
  opacity:.4;
  animation:float 10s linear infinite;
}
@keyframes float{
  from{transform:translateY(100vh);opacity:0}
  30%{opacity:.6}
  to{transform:translateY(-10vh);opacity:0}
}

h1{
  text-align:center;
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-weight:bold;
  margin-top:40px;
  letter-spacing:1px;
}

.timeline{
  max-width:1000px;
  margin:auto;
  padding:40px 20px 80px;
}

.card{
  background:rgba(255,255,255,0.06);
  border-radius:20px;
  padding:20px;
  margin:40px auto;
  backdrop-filter:blur(14px);
  box-shadow:0 10px 30px rgba(0,0,0,.4);
  transition:.5s;
}

.card:hover{
  transform:translateY(-8px) scale(1.02);
}

.card img{
  width:100%;
  border-radius:16px;
  margin-top:12px;
  object-fit:cover;
}

.date{
  font-weight:600;
  color:#ffd6e0;
  letter-spacing:1px;
}
